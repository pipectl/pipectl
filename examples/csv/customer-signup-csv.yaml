id: customer-signup

input:
  format: csv

steps:
  - log:
      message: ${LOG_MESSAGE}
      count: true
      sample: ${LOG_SAMPLE}

  - default:
      fields:
        country: AU

  - dedupe:
      fields: [last_name]
      case-sensitive: false

  - log:
      message: After dedupe

  - normalize:
      fields:
        country: trim|upper
        first_name: trim|capitalize
        last_name: trim|capitalize

  - filter:
      field: country
      equals: AU

  - log:
      message: After filter
      count: true
      sample: 0

  - redact:
      fields: [password]
      strategy: mask

  - redact:
      fields: [credit_card]
      strategy: partial-last

  - select:
      fields: [first_name, credit_card, dob]

  - rename:
      fields:
        first_name: firstName
        credit_card: creditCard
        dob: DOB

  - http-request:
      url: https://httpbin.org/status/201
      method: POST
      timeout: 60

  - count:
      message: "Final record count"

  - assert:
      records-equal: 19
      field-exists: firstName

  - limit:
      count: 10

output:
  format: jsonl