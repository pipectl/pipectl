id: customer-signup

input:
  format: csv

steps:
  - log:
      message: "Initial payload"
      count: true
      sample: 5

  - default:
      fields:
        country: AU

  - normalize:
      fields:
        country: upper
        first_name: capitalize
        last_name: capitalize

  - filter:
      field: country
      equals: AU

  - log:
      message: After filter
      count: true
      sample: 0

  - redact:
      fields: [credit_card, password]
      strategy: mask

  - select:
      fields: [first_name, credit_card, dob]

  - rename:
      fields:
        first_name: firstName
        credit_card: creditCard
        dob: DOB

  - count:
      message: "Final record count"

  - assert:
      records-equal: 20
      field-exists: firstName

  - limit:
      count: 10

output:
  format: jsonl