id: customer-signup

input:
  format: json

steps:
  - validate-json:
      schema: ./examples/json/signup-schema.json

  - normalize:
      fields:
        email: lower
        name: trim
        string: collapse-spaces

  - redact:
      strategy: mask
      fields: [credit_card, password]

  - http-transform:
      url: https://httpbin.org/post
      method: POST
      timeout: 60
      headers:
        X-Pipectl-Step: http-transform
        Authorization: Bearer asdf

  - redact:
      fields: [data, origin]

output:
  format: json
