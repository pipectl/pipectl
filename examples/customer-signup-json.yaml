id: customer-signup

input:
  format: json

steps:
  - validate-json:
      schema: schemas/signup.json

  - normalize:
      fields:
        email: lower
        name: trim
        string: collapse-spaces

  - redact:
      strategy: mask
      fields: [credit_card, password]

  - http-transform:
      url: https://httpbin.org/post
      method: POST

  - redact:
      fields: [data, origin]

output:
  format: json