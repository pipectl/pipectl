id: customer-signup

input:
  format: jsonl

steps:
  - validate-json:
      schema: ./examples/json/schema/signup-schema.json

  - log:
      message: "Initial payload"

  - default:
      fields:
        country: AU
        currency: AUD

  - normalize:
      fields:
        email: lower
        name: trim
        string: collapse-spaces

  - redact:
      strategy: mask
      fields: [credit_card, password]

  - rename:
      fields:
        credit_card: creditCard

  - redact:
      fields: [data, origin]

  - count:
      message: Final record count

output:
  format: json
