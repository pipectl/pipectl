id: customer-signup

input:
  format: csv

steps:
  - normalize:
      fields:
        country: upper
        first_name: capitalize
        last_name: capitalize

  - filter:
      field: country
      equals: AU

  - redact:
      fields: [credit_card, password]
      strategy: mask

  - select:
      fields: [first_name, credit_card, dob]

  - rename:
      fields:
        first_name: firstName
        credit_card: creditCard
        dob: DOB

output:
  format: csv