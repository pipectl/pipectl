id: customer-signup

input:
  format: json

steps:
  - validate-json:
      schema: ./examples/json/schema/signup-schema.json

  - log:
      message: "Initial payload"

  - default:
      fields:
        country: AU
        currency: AUD

  - log:
      message: "After default"

  - normalize:
      fields:
        email: lower
        name: trim
        string: collapse-spaces

  - redact:
      strategy: mask
      fields: [credit_card, password]

  - rename:
      fields:
        credit_card: creditCard

  - http-transform:
      url: https://httpbin.org/post
      method: POST
      timeout: 60
      headers:
        X-Pipectl-Step: http-transform
        Authorization: Basic dXNlcm5hbWU6cGFzc3dvcmQ=
      expect-format: json

  - redact:
      fields: [data, origin]

  - log:
      message: "Payload before conversion"

  - convert:
      format: csv

  - log:
      message: "Converted payload to CSV"

  - convert:
      format: json

  - log:
      message: "Converted payload back to JSON"

  - cast:
      fields:
        headers.Content-Length:
          type: int

  - count:
      message: Final record count

output:
  format: json
